[workspace]
resolver = "2"
members = ["crates/infra-core", "crates/kernel"]

[workspace.package]
version = "0.3.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/xhyperium/infra.rs"
rust-version = "1.85"

[workspace.dependencies]
# 共享依赖（按需在各 crate 中引用）
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
