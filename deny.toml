# cargo-deny 配置
# 文档：https://embarkstudios.github.io/cargo-deny/
#
# 跨平台说明：
#   targets 限定当前 CI 的目标 triple；Windows/macOS 平台需在对应
#   runner 上分别执行 cargo deny check。

[graph]
all-features = true

targets = [{ triple = "x86_64-unknown-linux-gnu" }]

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2025-0134", reason = "redis 0.27 tls-rustls depends on rustls-pemfile; no safe upgrade until redis bumps" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
skip = [
  { name = "getrandom", version = "0.2" },
  { name = "getrandom", version = "0.3" },
  { name = "rustls-native-certs", version = "0.7" },
  { name = "openssl-probe", version = "0.1" },
  # macOS-only skips (uncomment if building on macOS):
  #   { name = "core-foundation", version = "0.9" },
  #   { name = "security-framework", version = "2" },
  { name = "syn", version = "2" },
  { name = "block-buffer", version = "0.10" },
  { name = "const-oid", version = "0.9" },
  { name = "cpufeatures", version = "0.2" },
  { name = "crypto-common", version = "0.1" },
  { name = "digest", version = "0.10" },
  { name = "hmac", version = "0.12" },
  { name = "sha2", version = "0.10" },
  { name = "rand", version = "0.8" },
  { name = "rand", version = "0.9" },
  { name = "rand_chacha", version = "0.3" },
  { name = "rand_chacha", version = "0.9" },
  { name = "rand_core", version = "0.6" },
  { name = "rand_core", version = "0.9" },
  { name = "webpki-roots", version = "0.26" },
  { name = "thiserror", version = "1" },
  { name = "thiserror-impl", version = "1" },
]
