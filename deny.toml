# cargo-deny 配置
# 文档：https://embarkstudios.github.io/cargo-deny/

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
# tracing-attributes / transportx rustls 栈常见双版本
skip = [
  { name = "getrandom", version = "0.2" },
  { name = "syn", version = "2" },
  { name = "windows-sys", version = "0.52" },
]
