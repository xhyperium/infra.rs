[package]
name = "binancex"
description = "binance exchange adapter (VenueAdapter scaffold)"
version = "0.3.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[features]
default = []
## 文档/测门控：启用 live-test 用例编译路径（网络测仍 #[ignore]）
live-test = []

[dependencies]
async-trait = { workspace = true }
bytes = { workspace = true }
futures-core = { workspace = true }
futures-util = { workspace = true }
canonical = { path = "../../../types/canonical", version = "0.1.1" }
contracts = { path = "../../../contracts", version = "0.1.1" }
decimalx = { path = "../../../types/decimal", version = "0.1.1" }
hex = { workspace = true }
hmac = "0.12"
kernel = { path = "../../../kernel", version = "0.3.0" }
serde_json = { workspace = true }
serde = { workspace = true }
sha2 = { workspace = true }
transportx = { path = "../../../transport", version = "0.1.1" }

[dev-dependencies]
tokio = { workspace = true }

[[bench]]
name = "hot_path"
harness = false

[lints]
workspace = true
