[package]
name = "redisx"
description = "production Redis client (KeyValueStore + optional PubSub; scaffold behind feature)"
version = "0.3.15"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[features]
default = ["runtime-tokio"]
runtime-tokio = []
pubsub = []
scaffold = []
# 兼容旧 CI / 调用方：`--features live` 仍可编译（生产路径默认已启用 redis）
live = []

[dependencies]
async-trait = { workspace = true }
bytes = { workspace = true }
futures-core = { workspace = true }
futures-util = { workspace = true }
contracts = { path = "../../../contracts", version = "0.1.4", package = "xhyper-contracts" }
kernel = { path = "../../../kernel", version = "0.3.1", package = "xhyper-kernel" }
redis = { workspace = true }
resiliencx = { path = "../../../resiliencx", version = "0.1.2", features = [
  "tokio",
] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "macros", "rt"] }
tracing = { workspace = true }

[dev-dependencies]
contract-testkit = { path = "../../../test-support/contracts", version = "0.1.4" }
tokio = { workspace = true, features = [
  "rt-multi-thread",
  "macros",
  "sync",
  "time",
] }

[[bench]]
name = "kv_hot_path"
harness = false

[[bench]]
name = "api_matrix"
harness = false

[lints]
workspace = true
