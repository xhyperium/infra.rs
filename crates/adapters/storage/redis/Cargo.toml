[package]
name = "redisx"
description = "production Redis client (KeyValueStore + optional PubSub; scaffold behind feature)"
version = "0.3.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[features]
default = ["runtime-tokio"]
runtime-tokio = []
pubsub = []
scaffold = []
# 兼容旧 CI / 调用方：`--features live` 仍可编译（生产路径默认已启用 redis）
live = []

[dependencies]
async-trait = { workspace = true }
bytes = { workspace = true }
futures-core = { workspace = true }
futures-util = { workspace = true }
contracts = { path = "../../../contracts", version = "0.1.0" }
kernel = { path = "../../../kernel", version = "0.3.0" }
redis = { workspace = true }
resiliencx = { path = "../../../resiliencx", version = "0.1.0", features = ["tokio"] }
tokio = { workspace = true, features = ["sync", "time", "macros", "rt"] }

[dev-dependencies]
tokio = { workspace = true, features = [
  "rt-multi-thread",
  "macros",
  "sync",
  "time",
] }

[[bench]]
name = "kv_hot_path"
harness = false

[lints]
workspace = true
