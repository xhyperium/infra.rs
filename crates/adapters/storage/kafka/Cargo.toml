[package]
name = "kafkax"
description = "kafka storage adapter (KafkaPool + EventBus via pure-Rust rskafka; gap-zero 0.3.9 strict stats API tests)"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[features]
default = []
# 旧内存 scaffold / mock（迁移与离线演示）
scaffold = []
# 兼容旧 feature 名：SASL 已内置于 rskafka（rsasl）
sasl = []

[dependencies]
async-trait = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
futures-core = { workspace = true }
futures-util = { workspace = true }
contracts = { path = "../../../contracts", version = "0.1.5", package = "xhyper-contracts" }
kernel = { path = "../../../kernel", version = "0.3.2", package = "xhyper-kernel" }
rskafka = { workspace = true }
serde = { workspace = true }
rustls = { workspace = true }
rustls-pemfile = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
webpki-roots = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }

[[bench]]
name = "hot_path"
harness = false

[lints]
workspace = true
