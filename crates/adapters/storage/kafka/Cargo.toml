[package]
name = "kafkax"
description = "kafka storage adapter (KafkaPool + EventBus; optional scaffold)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[features]
default = []
# 旧内存 scaffold / mock（迁移与离线演示）
scaffold = []
# 需要系统 libsasl2；CI 默认关闭以避免 sasl2-sys 构建失败
sasl = ["rdkafka/sasl"]

[dependencies]
async-trait = { workspace = true }
bytes = { workspace = true }
futures-core = { workspace = true }
futures-util = { workspace = true }
contracts = { path = "../../../contracts", version = "0.1.0" }
kernel = { path = "../../../kernel", version = "0.3.0" }
rdkafka = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }

[[bench]]
name = "hot_path"
harness = false

[lints]
workspace = true
