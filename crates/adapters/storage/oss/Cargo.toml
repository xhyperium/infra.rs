[package]
name = "ossx"
description = "Aliyun OSS ObjectStore adapter (reqwest + OSS V1 signing)"
version = "0.3.2"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[features]
default = []
# 启用后暴露进程内 scaffold `OssAdapter`（非生产）
scaffold = []

[dependencies]
async-trait = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
contracts = { path = "../../../contracts", version = "0.1.2" }
hmac = { workspace = true }
kernel = { path = "../../../kernel", version = "0.3.1" }
reqwest = { workspace = true }
resiliencx = { path = "../../../resiliencx", version = "0.1.2", features = [
  "tokio",
] }
sha1 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
url = { workspace = true }

[dev-dependencies]
contract-testkit = { path = "../../../test-support/contracts", version = "0.1.2" }
criterion = { workspace = true }
tokio = { workspace = true }

[[bench]]
name = "put_get"
harness = false

[lints]
workspace = true
