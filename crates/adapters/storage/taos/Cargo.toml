[package]
name = "taosx"
description = "taos storage adapter (TimeSeriesStore; REST production client)"
version = "0.3.10"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[features]
default = []
# 进程内内存 scaffold（非生产）
scaffold = []

[dependencies]
async-trait = { workspace = true }
futures-core = { workspace = true }
futures-util = { workspace = true }
canonical = { path = "../../../types/canonical", version = "0.1.2" }
chrono = { workspace = true }
contracts = { path = "../../../contracts", version = "0.1.4" }
decimalx = { path = "../../../types/decimal", version = "0.1.2" }
kernel = { package = "xhyper-kernel", path = "../../../kernel", version = "0.3.1" }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
contract-testkit = { path = "../../../test-support/contracts", version = "0.1.4" }
tokio = { workspace = true }

[[bench]]
name = "hot_path"
harness = false

[[bench]]
name = "api_matrix"
harness = false

[[bench]]
name = "critical_path"
harness = false

[[bench]]
name = "query_scale"
harness = false

[[example]]
name = "btc_eth_crud"

[[example]]
name = "import_all"

[lints]
workspace = true
