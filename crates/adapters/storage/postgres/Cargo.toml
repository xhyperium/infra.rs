[package]
name = "postgresx"
description = "postgres storage adapter (production pool/SQL + optional scaffold)"
version = "0.3.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[features]
default = []
# 进程内 scaffold / mock（PostgresAdapter / ObservingPostgresAdapter）
scaffold = []

[dependencies]
async-trait = { workspace = true }
contracts = { path = "../../../contracts", version = "0.1.0" }
deadpool-postgres = { workspace = true }
kernel = { path = "../../../kernel", version = "0.3.0" }
resiliencx = { path = "../../../resiliencx", version = "0.1.0", features = [
  "tokio",
] }
rustls = { workspace = true }
rustls-pki-types = { workspace = true }
tokio = { workspace = true }
tokio-postgres = { workspace = true }
tokio-rustls = { workspace = true }
tracing = { workspace = true, optional = true }
webpki-roots = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }

[[bench]]
name = "query_hot_path"
harness = false

[lints]
workspace = true
