[package]
name = "decimalx"
version = "0.1.1"
edition.workspace = true
rust-version.workspace = true
description = "/types/ 十进制数值类型（ADR-006/007，spec §4.2）"
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "decimalx"

[features]
default = []
# 可选：`impl Add/Sub/Mul for Decimal`（溢出 panic）。生产资金路径必须保持关闭，改用 checked_*。
panicking-ops = []

[dependencies]
# path + version：满足 cargo-deny bans.wildcards=deny（禁止裸 path 通配依赖）
kernel = { path = "../../kernel", version = "0.3.0" }
serde = { workspace = true }

[dev-dependencies]
bigdecimal = "0.4"
proptest = "1"
serde_json = { workspace = true }

[lints]
workspace = true

[[bench]]
name = "hot_path"
harness = false
