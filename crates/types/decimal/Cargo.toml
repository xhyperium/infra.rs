[package]
name = "xhyper-decimalx"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "/types/ 十进制数值类型（ADR-006/007，spec §4.2）"
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "decimalx"

[dependencies]
# path + version：满足 cargo-deny bans.wildcards=deny（禁止裸 path 通配依赖）
xhyper-kernel = { path = "../../kernel", version = "0.3.0" }
serde = { workspace = true }

[dev-dependencies]
proptest = "1"
serde_json = { workspace = true }
