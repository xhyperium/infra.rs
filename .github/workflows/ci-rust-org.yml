# 复用 xhyperium 组织级 Rust Foundation CI（与本仓既有细粒度 workflow 并存）
#
# 组织 SSOT / 可复用定义：
#   https://github.com/xhyperium/.github/blob/main/workflows/ci-rust-foundation.yml
#
# status checks（可供 org ruleset 引用）：
#   rust-fmt · rust-clippy · rust-test · rust-deny

name: CI Rust（组织复用）

on:
  # 组织 ruleset 强制 rust-fmt/clippy/test：PR 不得用 paths 过滤，否则纯文档 PR 永远等不到 check
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-rust-org-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  org-rust:
    uses: xhyperium/.github/.github/workflows/ci-rust-foundation.yml@main
    with:
      rust_toolchain: "1.85"
      run_deny: true
