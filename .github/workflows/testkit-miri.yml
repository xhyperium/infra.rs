name: Testkit Miri

# testkit crate Miri UB 检测（SPEC-TESTKIT-002 §13.8 / §24.3）
# scheduled / workflow_dispatch；ManualClock 无真实时间依赖，默认 isolation 即可

on:
  schedule:
    - cron: "0 5 * * 1" # 每周一 05:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  miri:
    name: Miri UB 检测
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
    steps:
      - uses: actions/checkout@v4
      - name: 安装 nightly 工具链 (miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: 运行 Miri
        run: cargo +nightly miri test -p testkit
