name: Kernel Miri

# kernel crate Miri UB 检测（RES-TEST-016）
# nightly/scheduled job，miri test 全部通过为门禁
# 默认隔离模式下 SystemClock::now() 调用 clock_gettime(REALTIME) 被拒绝，
# 使用 -Zmiri-disable-isolation 绕过（与现有 evidence 一致）

on:
  schedule:
    - cron: "0 4 * * 1" # 每周一 04:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  miri:
    name: Miri UB 检测
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - name: 安装 nightly 工具链 (miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: 运行 Miri
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        run: cargo +nightly miri test -p kernel --all-features
