name: 自动 Rebase（标签）

on:
  pull_request_target:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  # 受保护分支模式（空格分隔，shell glob）
  PROTECTED_PATTERNS: "main develop release/*"

jobs:
  # ── 安全校验层 ──────────────────────────────────────────────
  validate:
    name: 安全校验
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'rebase' &&
      github.event.pull_request.state == 'open'
    outputs:
      is_fork: ${{ steps.check.outputs.is_fork }}
      is_draft: ${{ steps.check.outputs.is_draft }}
      is_protected: ${{ steps.check.outputs.is_protected }}
      head_valid: ${{ steps.check.outputs.head_valid }}
      base_valid: ${{ steps.check.outputs.base_valid }}
      head_branch: ${{ steps.check.outputs.head_branch }}
      base_branch: ${{ steps.check.outputs.base_branch }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      actor: ${{ steps.check.outputs.actor }}
    steps:
      - name: 输入校验与分支名验证
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const headBranch = pr.head.ref;
            const baseBranch = pr.base.ref;
            const headRepo = pr.head.repo.full_name;
            const repo = context.repo.owner + '/' + context.repo.repo;

            // 1. 严格输入校验
            //    拒绝 ..（路径遍历）
            //    拒绝以 . 开头或包含 /. （隐藏目录）
            //    仅允许 [a-zA-Z0-9][a-zA-Z0-9._/-]
            const BRANCH_RE = /^[a-zA-Z0-9][a-zA-Z0-9._\/-]{0,253}$/;
            const hasDots = headBranch.includes('..');
            const hasHidden = headBranch.split('/').some(s => s.startsWith('.'));
            const headValid = BRANCH_RE.test(headBranch) && !hasDots && !hasHidden;
            const baseValid = BRANCH_RE.test(baseBranch) && !baseBranch.includes('..');

            // 2. 受保护分支检查（换用 shell 数组格式）
            const protectedPatterns = '${{ env.PROTECTED_PATTERNS }}'.split(/\s+/).filter(Boolean);
            const shGlobToRegex = (g) => new RegExp(
              '^' + g.replace(/[.+^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '.*') + '$'
            );
            const isProtected = protectedPatterns.some(p => shGlobToRegex(p).test(headBranch));

            // 3. Fork / Draft 检查
            const isFork = headRepo !== repo;
            const isDraft = pr.draft;

            core.setOutput('is_fork', isFork.toString());
            core.setOutput('is_draft', isDraft.toString());
            core.setOutput('is_protected', isProtected.toString());
            core.setOutput('head_valid', headValid.toString());
            core.setOutput('base_valid', baseValid.toString());
            core.setOutput('head_branch', headBranch);
            core.setOutput('base_branch', baseBranch);
            core.setOutput('pr_number', pr.number.toString());
            core.setOutput('actor', context.actor);

            // 输出校验摘要
            core.summary.addHeading('Rebase 安全校验', 2);
            core.summary.addTable([
              ['检查项', '结果'],
              ['Fork PR', isFork ? '❌' : '✅'],
              ['Draft PR', isDraft ? '⚠️' : '✅'],
              ['受保护分支', isProtected ? '❌' : '✅'],
              ['分支名 head 有效', headValid ? '✅' : '❌'],
              ['分支名 base 有效', baseValid ? '✅' : '❌'],
            ]);
            core.summary.write();

  # ── Fork 通知 ───────────────────────────────────────────────
  notify-fork:
    name: Fork PR 通知
    needs: validate
    if: needs.validate.outputs.is_fork == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 通知不支持
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.validate.outputs.pr_number }};
            const headBranch = '${{ needs.validate.outputs.head_branch }}';
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: 'rebase'
            }).catch(() => {});
            const body = [
              '🔒 **自动 Rebase 不支持 Fork PR**',
              '',
              '请手动 rebase 后 force-push：',
              '```bash',
              'git fetch origin main',
              'git rebase origin/main',
              'git push --force-with-lease origin ' + headBranch,
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

  # ── 阻断：受保护分支 / 无效输入 ────────────────────────────
  block-invalid:
    name: 阻断非法操作
    needs: validate
    if: |
      needs.validate.outputs.head_valid == 'false' ||
      needs.validate.outputs.base_valid == 'false' ||
      needs.validate.outputs.is_protected == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 阻断并报告
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.validate.outputs.pr_number }};
            const headBranch = '${{ needs.validate.outputs.head_branch }}';
            const actor = '${{ github.actor }}';
            const reasons = [];
            if ('${{ needs.validate.outputs.head_valid }}' === 'false') reasons.push('head 分支名包含非法字符');
            if ('${{ needs.validate.outputs.base_valid }}' === 'false') reasons.push('base 分支名包含非法字符');
            if ('${{ needs.validate.outputs.is_protected }}' === 'true') reasons.push('禁止 force-push 受保护分支');

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: 'rebase'
            }).catch(() => {});

            const reasonRows = reasons.map(r => '| ' + r + ' |').join('\n');
            const body = [
              '🚫 **自动 Rebase 已阻断**',
              '',
              '| 原因 |',
              '|------|',
              reasonRows,
              '',
              '审计：',
              '- 触发者：@' + actor,
              '- 分支：`' + headBranch + '`',
              '- 时间：' + new Date().toISOString(),
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

  # ── 执行 Rebase ─────────────────────────────────────────────
  rebase:
    name: Rebase 执行
    needs: validate
    if: |
      needs.validate.outputs.is_fork == 'false' &&
      needs.validate.outputs.is_draft == 'false' &&
      needs.validate.outputs.is_protected == 'false' &&
      needs.validate.outputs.head_valid == 'true' &&
      needs.validate.outputs.base_valid == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 审计日志 — 开始
        id: audit-start
        run: |
          echo "action=rebase-on-label" >> "$GITHUB_OUTPUT"
          echo "actor=${{ needs.validate.outputs.actor }}" >> "$GITHUB_OUTPUT"
          echo "pr=${{ needs.validate.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
          echo "head=${{ needs.validate.outputs.head_branch }}" >> "$GITHUB_OUTPUT"
          echo "base=${{ needs.validate.outputs.base_branch }}" >> "$GITHUB_OUTPUT"
          echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "commit=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: 移除 rebase 标签
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ needs.validate.outputs.pr_number }},
                name: 'rebase'
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }

      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.head_branch }}
          repository: ${{ github.repository }}
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase 到目标分支
        id: rebase
        run: |
          set -o pipefail
          BASE="${{ needs.validate.outputs.base_branch }}"
          HEAD="${{ needs.validate.outputs.head_branch }}"

          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "head=${HEAD}" >> "$GITHUB_OUTPUT"

          git fetch origin "${BASE}"

          if git rebase "origin/${BASE}"; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "message=Rebase 成功：${HEAD} ← ${BASE}" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            echo "message=Rebase 冲突：${HEAD} ← ${BASE}，请手动解决" >> "$GITHUB_OUTPUT"
          fi

      - name: 强制推送
        if: steps.rebase.outputs.status == 'success'
        id: push
        run: |
          HEAD="${{ steps.rebase.outputs.head }}"

          # 二次核验：使用 shell 数组避免解析歧义
          PROTECTED=(${{ env.PROTECTED_PATTERNS }})
          for pat in "${PROTECTED[@]}"; do
            re=$(echo "$pat" | sed 's/[.+^${}()|[]/\\&/g; s/\*/.*/g')
            if echo "$HEAD" | grep -qE "^${re}$"; then
              echo "::error::拒绝 push：${HEAD} 匹配受保护分支 ${pat}"
              exit 1
            fi
          done

          if git push --force-with-lease origin "${HEAD}" 2>&1; then
            echo "push_status=pushed" >> "$GITHUB_OUTPUT"
          else
            echo "::error::force-with-lease 推送失败——远程分支可能已被更新"
            echo "push_status=lease-fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: 审计日志 — 结果
        if: always()
        run: |
          result="${{ steps.push.outputs.push_status || steps.rebase.outputs.status || 'blocked' }}"
          echo "result=${result}" >> "$GITHUB_OUTPUT"

      - name: 报告结果
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const STATUS = '${{ steps.push.outputs.push_status || steps.rebase.outputs.status }}' || 'blocked';
            const prNumber = ${{ needs.validate.outputs.pr_number }};
            const head = '${{ steps.rebase.outputs.head }}';
            const base = '${{ steps.rebase.outputs.base }}';
            const actor = '${{ needs.validate.outputs.actor }}';
            const ts = '${{ steps.audit-start.outputs.ts }}';
            const runId = '${{ github.run_id }}';

            const map = {
              'pushed':       ['✅', 'Rebase 成功并已推送'],
              'success':      ['✅', 'Rebase 成功（推送状态未知）'],
              'lease-fail':   ['⚠️', 'Rebase 成功但 force-with-lease 失败，请手动推送'],
              'conflict':     ['❌', 'Rebase 冲突，请手动解决'],
              'blocked':      ['🚫', '执行被阻断'],
            };
            const [icon, text] = map[STATUS] || ['❓', STATUS];

            const body = [
              icon + ' **' + text + '**',
              '',
              '| 项目 | 值 |',
              '|------|-----|',
              '| PR | #' + prNumber + ' |',
              '| 分支 | `' + head + '` |',
              '| 目标 | `' + base + '` |',
              '| 触发者 | @' + actor + ' |',
              '| 审计 | `' + ts + '` / `' + runId + '` |',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
