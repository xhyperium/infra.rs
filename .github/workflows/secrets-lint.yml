name: Secrets Lint

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "scripts/sre/**"
      - "secrets/env/**"
      - ".github/workflows/secrets-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has-scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
      - name: 检测变更
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            scripts:
              - "scripts/sre/**"
              - "secrets/env/**"
              - ".github/workflows/secrets-lint.yml"

  lint-tables:
    needs: check-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.check-changes.outputs.has-scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 验证 dev 凭据文档可解析
        id: dev-tables
        if: ${{ false }}
        run: |
          echo "Secret doc validation requires secrets/env/ files."
          echo "These files are NOT committed to this repo for security."
          echo ""
          echo "Integration with the source repo would be added"
          echo "when the secrets/env/ directory is in the same repo."

  lint-dotenv:
    needs: check-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.check-changes.outputs.has-scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 验证 secrets-migrate-all 语法
        run: |
          echo "Verifying migration scripts parse correctly..."
          node -e "import('./scripts/sre/secrets-migrate-all.mjs'); console.log('Syntax OK')"
          node -e "import('./scripts/sre/secrets-migrate.mjs'); console.log('Syntax OK')"

      - name: 验证单元逻辑（无外部文件）
        run: |
          node -e "
            import { parseDotenv, parseStackEnv, entriesToSecrets, mask } from './scripts/sre/secrets-migrate-all.mjs';

            // Test dotenv parser
            const dotenv = parseDotenv('KEY1=value1\n# comment\nKEY2=\"quoted_value\"\n\nEMPTY=\n');
            const ok1 = dotenv.length === 2 && dotenv[0].value === 'value1';
            console.log(ok1 ? 'PASS' : 'FAIL', 'dotenv parser');

            // Test stack parser
            const stack = parseStackEnv('POSTGRES_PASSWORD=secret\nDB_PORT=5432\nAPI_KEY=token');
            const ok2 = stack.length === 2 && stack[0].name === 'POSTGRES_PASSWORD';
            console.log(ok2 ? 'PASS' : 'FAIL', 'stack parser');

            // Test masking
            const m = mask('testvalue');
            const ok3 = m === 'te*****ue';
            console.log(ok3 ? 'PASS' : 'FAIL', 'mask short value');

            const m2 = mask('abc');
            const ok4 = m2 === '***';
            console.log(ok4 ? 'PASS' : 'FAIL', 'mask minimal value');

            const all_ok = ok1 && ok2 && ok3 && ok4;
            process.exit(all_ok ? 0 : 1);
          "

  summary:
    needs: [lint-tables, lint-dotenv]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总
        run: |
          echo "Secrets lint complete"
