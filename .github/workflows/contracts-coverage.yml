name: Contracts Coverage

# contracts：LCOV 行覆盖率 100%

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - "crates/contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/quality-gates/cov-gate-100.mjs"
      - ".github/workflows/contracts-coverage.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  line-coverage:
    name: 行覆盖率 (100%)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: 安装 cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: 行覆盖率 100% (LCOV)
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: node scripts/quality-gates/cov-gate-100.mjs -p contracts --filter crates/contracts/src
