name: Observex Coverage

# observex：LCOV 行覆盖率 100%

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - "crates/observex/**"
      - "crates/contracts/**"
      - "crates/kernel/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/quality-gates/cov-gate-100.mjs"
      - ".github/workflows/observex-coverage.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  line-coverage:
    name: 行覆盖率 (100%)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: 安装 cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: 行覆盖率 100% (LCOV)
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: node scripts/quality-gates/cov-gate-100.mjs -p observex --filter crates/observex/src
