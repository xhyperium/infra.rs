name: ConfigX Coverage

# configx：LCOV 行覆盖率 100%

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - "crates/configx/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/quality-gates/cov-gate-100.mjs"
      - ".github/workflows/configx-coverage.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: 行覆盖率 (100%)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: LCOV 100%
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: node scripts/quality-gates/cov-gate-100.mjs -p configx --filter crates/configx/src
