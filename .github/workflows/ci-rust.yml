name: CI（Rust）

on:
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "crates/**"
      - "rust-toolchain.toml"
      - ".github/workflows/ci-rust.yml"

  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-rust:
    name: 检测 Rust 源码
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has-rust: ${{ steps.check.outputs.has-rust }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f Cargo.toml ] && [ -d crates ]; then
            echo "has-rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-rust=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: 检查
    needs: check-rust
    if: needs.check-rust.outputs.has-rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 验证 rust-cache
        run: |
          echo "rust-cache target size: $(du -sh target 2>/dev/null | cut -f1)"
        continue-on-error: true
      - name: 检查
        run: cargo check --workspace --all-features

  test:
    name: 测试
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 验证 rust-cache
        run: |
          echo "rust-cache target size: $(du -sh target 2>/dev/null | cut -f1)"
        continue-on-error: true
      - name: 安装 cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: 测试
        run: cargo nextest run --workspace --all-features

  msrv:
    name: 最低版本兼容（MSRV 1.85）
    needs: check-rust
    if: needs.check-rust.outputs.has-rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - name: 安装 MSRV Rust 工具链
        uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: 验证 rust-cache
        run: |
          echo "rust-cache target size: $(du -sh target 2>/dev/null | cut -f1)"
        continue-on-error: true
      - name: 在 MSRV 上构建
        run: cargo build --workspace --all-features

  coverage:
    name: 覆盖率
    needs: check-rust
    if: needs.check-rust.outputs.has-rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: 验证 rust-cache
        run: |
          echo "rust-cache target size: $(du -sh target 2>/dev/null | cut -f1)"
        continue-on-error: true
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: 生成覆盖率
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: 上传覆盖率到 Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  summary:
    name: 缓存摘要
    needs: [build, test, msrv, coverage]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: CI Cache Summary
        run: |
          echo "## CI Cache Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result | Cache |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 检查 | ${{ needs.build.result }} | rust-cache@v2 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 测试 | ${{ needs.test.result }} | rust-cache@v2 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MSRV | ${{ needs.msrv.result }} | rust-cache@v2 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 覆盖率 | ${{ needs.coverage.result }} | rust-cache@v2 |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Cache backend: Swatinem/rust-cache@v2 | CARGO_INCREMENTAL=0" >> "$GITHUB_STEP_SUMMARY"
