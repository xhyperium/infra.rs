# Kernel loom concurrency models — continuous gate (SPEC-KERNEL lifecycle)
name: kernel-loom

on:
  pull_request:
    paths:
      - "crates/kernel/**"
      - ".github/workflows/kernel-loom.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  loom:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: loom lifecycle concurrency
        env:
          RUSTFLAGS: "--cfg loom"
        run: cargo test -p kernel --test lifecycle_concurrency_loom --release
