# Kernel loom concurrency models — continuous gate (SPEC-KERNEL lifecycle)
name: kernel-loom

on:
  pull_request:
    paths:
      - "crates/kernel/**"
      - ".github/workflows/kernel-loom.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  loom:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: loom lifecycle concurrency
        env:
          RUSTFLAGS: "--cfg loom"
        run: cargo test -p kernel --test lifecycle_concurrency_loom --release
