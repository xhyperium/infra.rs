name: Testkit Mutants

# testkit crate 变异测试（SPEC-TESTKIT-002 §13.6 / §24.3）
# scheduled / workflow_dispatch；目标 mutation score ≥90%（missed 尽量为 0）

on:
  schedule:
    - cron: "0 6 * * 1" # 每周一 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutants:
    name: 变异测试
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: 安装 cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: 运行变异测试
        run: cargo mutants -p testkit --timeout 60
