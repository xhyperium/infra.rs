# Optional: exchange public server_time（infra-s9t.13）
name: Exchange Live Readonly
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/adapters/exchange/**"
      - ".github/workflows/exchange-live-readonly.yml"
jobs:
  public-time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: ignored live server_time
        run: |
          cargo test -p binancex --test live_server_time -- --ignored --nocapture
          cargo test -p okxx --test live_server_time -- --ignored --nocapture
