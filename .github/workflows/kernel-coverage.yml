name: Kernel Coverage

# kernel crate 分支覆盖率门禁（RES-TEST-014）
# 阈值: lines >= 95%, branches >= 90%, functions >= 90%

on:
  push:
    branches: [main]
    paths:
      - "crates/kernel/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/kernel-coverage.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/kernel/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/kernel-coverage.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  branch-coverage:
    name: 分支覆盖率 (≥90%)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: 安装 cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: 分支覆盖率门禁
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: |
          set -euo pipefail
          cargo +nightly llvm-cov \
            -p xhyper-kernel \
            --all-features \
            --branch \
            --summary-only 2>&1 | tee /tmp/cov.txt

          # cargo-llvm-cov 表头: ... Lines Missed Lines Cover | Branches Missed Branches Cover
          # TOTAL 行末尾三列: branches_total, missed_branches, branch_cover%
          # 例: TOTAL ... 631 7 98.89% 8 1 87.50%
          branch_pct=$(
            awk '
              /^TOTAL/ {
                for (i = 1; i <= NF; i++) {
                  if ($i ~ /%$/) last_pct = $i
                }
                gsub(/%/, "", last_pct)
                print last_pct
              }
            ' /tmp/cov.txt | tail -1
          )
          echo "Branch coverage: ${branch_pct}%"
          if [ -z "${branch_pct}" ]; then
            echo "::error::Failed to parse branch coverage from llvm-cov summary"
            exit 1
          fi
          # 使用 awk 做数值比较，避免 bc 缺失时门禁被跳过
          awk -v p="$branch_pct" 'BEGIN {
            if (p + 0 < 90) {
              printf "::error::Branch coverage %s%% is below 90%% threshold\n", p
              exit 1
            }
          }'

          cargo +nightly llvm-cov \
            -p xhyper-kernel \
            --all-features \
            --branch \
            --fail-under-lines 95 \
            --fail-under-functions 90
