name: Kernel Coverage

# kernel：LCOV 行覆盖率 100% + branch ≥90%

on:
  push:
    branches: [main, develop]
    paths:
      - "crates/kernel/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/cov-gate-100.mjs"
      - ".github/workflows/kernel-coverage.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "crates/kernel/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/cov-gate-100.mjs"
      - ".github/workflows/kernel-coverage.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: 覆盖率 (lines=100% / branch≥90%)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: 安装 cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: 行覆盖率 100% (LCOV)
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: node scripts/cov-gate-100.mjs -p kernel --filter crates/kernel/src --all-features
      - name: 分支覆盖率 ≥90%
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: |
          set -euo pipefail
          cargo +nightly llvm-cov \
            -p kernel \
            --all-features \
            --branch \
            --summary-only 2>&1 | tee /tmp/cov.txt
          branch_pct=$(
            awk '
              /^TOTAL/ {
                for (i = 1; i <= NF; i++) {
                  if ($i ~ /%$/) last_pct = $i
                }
                gsub(/%/, "", last_pct)
                print last_pct
              }
            ' /tmp/cov.txt | tail -1
          )
          echo "Branch coverage: ${branch_pct}%"
          if [ -z "${branch_pct}" ]; then
            echo "::error::Failed to parse branch coverage"
            exit 1
          fi
          awk -v p="$branch_pct" 'BEGIN {
            if (p + 0 < 90) {
              printf "::error::Branch coverage %s%% is below 90%% threshold\n", p
              exit 1
            }
          }'
