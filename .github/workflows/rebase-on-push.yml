name: push 时自动 Rebase

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  # 受保护分支列表（逗号分隔），禁止 force-push
  PROTECTED_BRANCHES: "main,develop,release/*"
  # 是否启用自动推送（设为 false 时仅 dry-run 报告）
  AUTO_PUSH_ENABLED: "true"

jobs:
  # ── 安全校验 + 审计 ─────────────────────────────────────────
  audit-and-rebase:
    name: 审计并 Rebase 开放 PR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 审计日志 — 开始
        id: audit-start
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'AUDIT_HEADER'
          ## 自动 Rebase 审计报告
          AUDIT_HEADER
          echo "| 项目 | 值 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 触发提交 | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 触发者 | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 时间 | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run ID | \`${{ github.run_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 查找、校验并 Rebase 开放 PR
        id: rebase-all
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -o pipefail

          git fetch origin main

          success_count=0
          conflict_count=0
          skip_count=0
          block_count=0
          results_json='['

          OWNER="${{ github.repository_owner }}"

          # 列出同仓库开放 PR（非 fork）
          pr_list=$(gh pr list \
            --state open \
            --base main \
            --json number,headRefName,headRepositoryOwner \
            --jq ".[] | select(.headRepositoryOwner.login == \"${OWNER}\") | \"\\(.number)|\\(.headRefName)\"")

          if [ -z "$pr_list" ]; then
            echo "没有需要 rebase 的同仓库开放 PR。" >> "$GITHUB_STEP_SUMMARY"
            echo "results=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          first=true
          while IFS='|' read -r pr_number head_branch; do
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo "### PR #${pr_number} (\`${head_branch}\`)" >> "$GITHUB_STEP_SUMMARY"

            # 1. 严格输入校验：分支名仅允许合法字符
            if ! echo "${head_branch}" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9._/-]{0,253}$' || \
               echo "${head_branch}" | grep -q '\.\.'; then
              echo "- 状态：阻断（分支名包含非法字符）" >> "$GITHUB_STEP_SUMMARY"
              block_count=$((block_count + 1))
              status="blocked-invalid"
              [ "$first" = true ] && first=false || results_json+=','
              results_json+="{\"number\":${pr_number},\"branch\":\"${head_branch}\",\"status\":\"${status}\"}"
              skip_count=$((skip_count + 1))
              continue
            fi

            # 2. 受保护分支检查
            protected=0
            IFS=',' read -ra PROTECTED <<< "${{ env.PROTECTED_BRANCHES }}"
            for p in "${PROTECTED[@]}"; do
              p=$(echo "$p" | xargs)
              pattern=$(echo "$p" | sed 's/\*/.*/g')
              if echo "${head_branch}" | grep -qE "^${pattern}$"; then
                protected=1
                break
              fi
            done
            if [ "$protected" -eq 1 ]; then
              echo "- 状态：阻断（受保护分支，禁止 force-push）" >> "$GITHUB_STEP_SUMMARY"
              block_count=$((block_count + 1))
              status="blocked-protected"
              [ "$first" = true ] && first=false || results_json+=','
              results_json+="{\"number\":${pr_number},\"branch\":\"${head_branch}\",\"status\":\"${status}\"}"
              skip_count=$((skip_count + 1))
              continue
            fi

            # 3. Fetch 并 rebase
            if ! git fetch origin "${head_branch}" 2>/dev/null; then
              echo "- 状态：跳过（无法获取分支）" >> "$GITHUB_STEP_SUMMARY"
              skip_count=$((skip_count + 1))
              continue
            fi

            if git checkout -b "ci-rebase-${pr_number}" "origin/${head_branch}" 2>/dev/null && \
               git rebase origin/main 2>/dev/null; then
              echo "- 状态：成功" >> "$GITHUB_STEP_SUMMARY"

              AUTO_PUSH="${{ env.AUTO_PUSH_ENABLED }}"
              if [ "${AUTO_PUSH}" = "true" ]; then
                if git push --force-with-lease origin "ci-rebase-${pr_number}:${head_branch}" 2>/dev/null; then
                  echo "  (已推送)" >> "$GITHUB_STEP_SUMMARY"
                  status="pushed"
                else
                  echo "  (rebase 成功但推送失败)" >> "$GITHUB_STEP_SUMMARY"
                  status="rebased-no-push"
                fi
              else
                echo "  (dry-run 模式，未推送)" >> "$GITHUB_STEP_SUMMARY"
                status="dry-run"
              fi

              git checkout main 2>/dev/null
              git branch -D "ci-rebase-${pr_number}" 2>/dev/null || true
              success_count=$((success_count + 1))
            else
              git rebase --abort 2>/dev/null || true
              git checkout main 2>/dev/null
              git branch -D "ci-rebase-${pr_number}" 2>/dev/null || true
              echo "- 状态：冲突，需手动解决" >> "$GITHUB_STEP_SUMMARY"
              status="conflict"
              conflict_count=$((conflict_count + 1))
            fi

            [ "$first" = true ] && first=false || results_json+=','
            results_json+="{\"number\":${pr_number},\"branch\":\"${head_branch}\",\"status\":\"${status}\"}"
          done <<< "$pr_list"

          results_json+=']'
          echo "results=${results_json}" >> "$GITHUB_OUTPUT"

          # 审计摘要
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 审计结果" >> "$GITHUB_STEP_SUMMARY"
          echo "| 统计 | 数量 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 成功 | ${success_count} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 冲突 | ${conflict_count} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 阻断 | ${block_count} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 跳过 | ${skip_count} |" >> "$GITHUB_STEP_SUMMARY"

      - name: 发布 PR 评论
        if: always() && steps.rebase-all.outputs.results != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const results = JSON.parse('${{ steps.rebase-all.outputs.results }}');

            for (const pr of results) {
              let emoji, statusText;

              switch (pr.status) {
                case 'pushed':
                  emoji = '✅';
                  statusText = 'rebase 成功并已推送';
                  break;
                case 'rebased-no-push':
                  emoji = '⚠️';
                  statusText = 'rebase 成功但推送失败';
                  break;
                case 'dry-run':
                  emoji = '🔍';
                  statusText = 'rebase 成功（dry-run 模式，未推送）';
                  break;
                case 'conflict':
                  emoji = '❌';
                  statusText = 'rebase 冲突，请手动解决';
                  break;
                case 'blocked-protected':
                  emoji = '🚫';
                  statusText = '阻断：分支匹配受保护分支模��，禁止 force-push';
                  break;
                case 'blocked-invalid':
                  emoji = '🚫';
                  statusText = '阻断：分支名包含非法字符';
                  break;
                default:
                  emoji = '❓';
                  statusText = pr.status;
              }

              const body = `${emoji} **自动 Rebase：\`${pr.branch}\` ← \`main\`**

              | 项目 | 值 |
              |------|-----|
              | PR | #${pr.number} |
              | 分支 | \`${pr.branch}\` |
              | 目标 | \`main\` |
              | 触发 | push \`${{ github.sha }}\` |
              | 结果 | ${statusText} |
              | 审计 | \`${{ github.run_id }}\` / $(date -u +%Y-%m-%dT%H:%M:%SZ) |
              ${pr.status === 'conflict' ? '| 操作 | \`git fetch origin main && git rebase origin/main\` |' : ''}`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
            }

      - name: 审计日志 — 完成
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'AUDIT_FOOTER'

          ---
          **审计完成** | Run: \`${{ github.run_id }}\` | 状态: ${{ job.status }}
          AUDIT_FOOTER
