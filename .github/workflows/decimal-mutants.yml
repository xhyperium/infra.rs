name: Decimal Mutants

# decimalx 变异测试（W1 / DEFER-4 证据链）
# scheduled；missed=0 为门禁

on:
  schedule:
    - cron: "0 5 * * 1" # 每周一 05:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutants:
    name: 变异测试 (missed=0)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 安装 cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: 运行变异测试
        run: |
          mkdir -p .cargo/cache/mutants
          cargo mutants -p decimalx -- --all-features
