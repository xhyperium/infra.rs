name: Constitution

# 宪章合规性验证 — 对应 CONSTITUTION.md 全部可自动化检查项

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "**/*.rs"
      - "deny.toml"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "clippy.toml"
      - "scripts/check-constitution.mjs"
      - ".github/workflows/constitution.yml"
      - "CONSTITUTION.md"
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "**/*.rs"
      - "deny.toml"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "clippy.toml"
      - "scripts/check-constitution.mjs"
      - ".github/workflows/constitution.yml"
      - "CONSTITUTION.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  constitution:
    name: Constitution Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run constitution checks
        run: ./scripts/check-constitution.mjs
        env:
          CARGO_TERM_COLOR: always
