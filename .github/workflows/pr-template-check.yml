name: PR Template Check

# PR 描述模板合规性校验
# 检查提交者是否在 PR body 中填写了模板要求的必填字段

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  template-check:
    name: Template Validation
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Check PR template
        id: check
        run: node scripts/check-pr-template.mjs 2>&1 | tee /tmp/check-result.txt
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        continue-on-error: true

      - name: Notify on failure
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const result = require('fs').readFileSync('/tmp/check-result.txt', 'utf8');
            const errors = result.match(/::error::[^\n]+/g) || [];
            const warnings = result.match(/::warning::[^\n]+/g) || [];

            const body = `## Template Validation 失败

PR 描述不符合模板格式。请[编辑 PR 描述](${context.payload.pull_request.html_url})。

### 必修项

${errors.map(e => `- ${e.replace('::error::', '')}`).join('\n')}
${warnings.length ? '\n### 建议\n' + warnings.map(w => `- ${w.replace('::warning::', '')}`).join('\n') : ''}

### 修复步骤

复制 [PULL_REQUEST_TEMPLATE.md](https://github.com/xhyperium/infra.rs/blob/main/.github/PULL_REQUEST_TEMPLATE.md) 中的模板，填入实际内容后替换 PR 描述。`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Exit with check result
        if: steps.check.outcome == 'failure'
        run: exit 1
