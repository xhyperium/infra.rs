name: Kernel Mutants

# kernel crate 变异测试（RES-TEST-015）
# nightly/scheduled job，missed=0 为门禁

on:
  schedule:
    - cron: "0 3 * * 1" # 每周一 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutants:
    name: 变异测试 (missed=0)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 安装 cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: 运行变异测试
        run: cargo mutants -p xhyper-kernel --all-features -- --all-features
