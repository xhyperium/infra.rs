name: Kernel Mutants

# kernel crate 变异测试（RES-TEST-015）
# nightly/scheduled job，missed=0 为门禁

on:
  schedule:
    - cron: "0 3 * * 1" # 每周一 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutants:
    name: 变异测试 (missed=0)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: 安装 cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: 运行变异测试
        run: |
          # .cargo/mutants.toml 输出到 .cargo/cache/mutants；干净 checkout 需先建父目录
          mkdir -p .cargo/cache/mutants
          cargo mutants -p kernel --all-features -- --all-features
