name: 校验

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-lint:
    name: YAML 检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 运行 yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              new-line-at-end-of-file: disable

  toml-lint:
    name: TOML 检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 安装 taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - name: 运行 taplo
        run: taplo fmt --check

  markdown-lint:
    name: Markdown 检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 运行 markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            README.md
            AGENTS.md
            CLAUDE.md
            docs/**/*.md
            crates/**/*.md
            tools/**/*.md

  spellcheck:
    name: 拼写检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 运行 cspell
        run: npx cspell --no-progress "{README,AGENTS,CLAUDE}.md" "docs/**/*.md" "crates/**/*.md" "tools/**/*.md"

  fence-check:
    name: 代码块结构检查
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 检查代码块开闭标记交替
        run: python3 scripts/standards/check-fences.py

  link-check:
    name: 链接检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 运行 lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress README.md AGENTS.md CLAUDE.md docs/
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  harness:
    name: Harness 健康检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'merge_group'
    steps:
      - uses: actions/checkout@v4
      - name: 脱离 detached HEAD
        run: |
          if [ "$(git rev-parse --abbrev-ref HEAD)" = "HEAD" ]; then
            git checkout -b harness-ci
          fi
      - name: 安装 bd CLI
        run: curl -sSL https://raw.githubusercontent.com/gastownhall/beads/main/scripts/install.sh | bash
      - name: 初始化 beads
        run: bd init --quiet
      - name: 运行 harness check
        run: node scripts/quality-gates/check.mjs

  canonical-align:
    name: Canonical 对齐检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 运行 canonical-align check
        run: node scripts/quality-gates/check-canonical-align.mjs

  decimal-panicking-ops:
    name: Decimal panicking-ops 门禁
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 扫描生产路径 panicking Decimal 用法
        run: node scripts/quality-gates/check-decimal-no-panicking-ops.mjs

  crate-versions:
    name: crates 独立版本门禁
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 校验 crates 独立 version + path 依赖对齐
        run: node scripts/quality-gates/check-crate-versions.mjs
  workspace-deps:
    name: 依赖集中管理门禁
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 校验依赖集中管理（禁止内联第三方版本）
        run: node scripts/quality-gates/check-workspace-deps.mjs
      - name: L1 单元测试
        run: node scripts/quality-gates/check-workspace-deps.test.mjs
      - name: 校验 Cargo/SSOT 当前事实
        run: node scripts/quality-gates/check-ssot-current-state.mjs
      - name: 运行 SSOT 隔离负向测试
        run: node scripts/quality-gates/check-ssot-current-state.test.mjs

  settings-hooks:
    name: settings hooks 门禁
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 校验 settings.json hook 命令格式
        run: node scripts/quality-gates/check-settings-hooks.mjs
      - name: L1 单元测试
        run: node scripts/quality-gates/check-settings-hooks.test.mjs

  crate-status:
    name: crates 进度看板
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'merge_group'
    steps:
      - uses: actions/checkout@v4
      - name: 校验 STATUS.md 新鲜度
        run: node scripts/docs/gen-crate-status.mjs --check
      - name: 写入 Job Summary
        if: always()
        run: node scripts/docs/gen-crate-status.mjs --summary >> "$GITHUB_STEP_SUMMARY"
  utf8-encoding:
    name: UTF-8 编码门禁
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 编码扫描
        run: |
          set -euo pipefail
          bad=0
          while IFS= read -r -d '' f; do
            enc=$(file -b --mime-encoding "$f")
            case "$enc" in
              *utf-8*|*ascii*|*us-ascii*) ;;
              *binary*) ;;
              *)
                echo "❌ $f → $enc"
                bad=$((bad+1))
                ;;
            esac
          done < <(find . -type f -not -path './.git/*' -not -path './node_modules/*' -not -path './.cargo/*' -not -path './target/*' -not -name '*.png' -not -name '*.jpg' -not -name '*.ico' -not -name '*.svg' -not -name '*.woff*' -not -name '*.lock' -print0)
          if [ "$bad" -gt 0 ]; then
            echo "❌ $bad 个非 UTF-8 文件"
            exit 1
          fi
          echo "✅ UTF-8 / ASCII"

          # 步骤 2：U+FFFD 替换字符（EF BF BD）— 阻断
          # 说明：file --mime-encoding 无法检测 U+FFFD，必须单独扫描
          fffd=0
          while IFS= read -r -d '' f; do
            if grep -aFq $'\xef\xbf\xbd' "$f"; then
              echo "❌ $f → 含 U+FFFD 替换字符（编码损坏）"
              fffd=$((fffd+1))
            fi
          done < <(find . -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './.cargo/*' \
            -not -path './target/*' \
            -not -path './.worktrees/*' \
            -not -name '*.png' -not -name '*.jpg' -not -name '*.ico' -not -name '*.svg' \
            -not -name '*.woff*' -not -name '*.lock' -not -name '*.bin' -not -name '*.dat' \
            \( -name '*.md' -o -name '*.rs' -o -name '*.toml' -o -name '*.yml' -o -name '*.yaml' \
               -o -name '*.mjs' -o -name '*.js' -o -name '*.cjs' -o -name '*.json' -o -name '*.sh' \
               -o -name '*.txt' \) -print0)
          if [ "$fffd" -gt 0 ]; then
            echo "❌ $fffd 个文件含 U+FFFD；请修复后重提 PR"
            echo "   扫描: node scripts/fix-encoding.mjs --check"
            exit 1
          fi
          echo "✅ 无 U+FFFD 替换字符"
