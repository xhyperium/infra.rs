name: ж ЎйӘҢ

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-lint:
    name: YAML жЈҖжҹ?
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: иҝҗиЎҢ yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              new-line-at-end-of-file: disable

  toml-lint:
    name: TOML жЈҖжҹ?
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: е®үиЈ… taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - name: иҝҗиЎҢ taplo
        run: taplo fmt --check

  markdown-lint:
    name: Markdown жЈҖжҹ?
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: иҝҗиЎҢ markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            README.md
            AGENTS.md
            CLAUDE.md
            docs/**/*.md

  spellcheck:
    name: жӢјеҶҷжЈҖжҹ?
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: иҝҗиЎҢ codespell
        uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_list: ser,ans,implementors,multiplikation,methoden,ALO
          skip: scripts/beads/gh-sync-i18n-test.mjs

  link-check:
    name: й“ҫжҺҘжЈҖжҹ?
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: иҝҗиЎҢ lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress README.md AGENTS.md CLAUDE.md docs/
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  harness:
    name: Harness еҒҘеә·жЈҖжҹ?
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: и„ұзҰ» detached HEAD
        run: |
          if [ "$(git rev-parse --abbrev-ref HEAD)" = "HEAD" ]; then
            git checkout -b harness-ci
          fi
      - name: е®үиЈ… bd CLI
        run: curl -sSL https://raw.githubusercontent.com/gastownhall/beads/main/scripts/install.sh | bash
      - name: еҲқе§ӢеҢ? beads
        run: bd init --quiet
      - name: иҝҗиЎҢ harness check
        run: node scripts/quality-gates/check.mjs

  canonical-align:
    name: Canonical еҜ№йҪҗжЈҖжҹ?
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: е®үиЈ… Rust е·Ҙе…·й“?
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: иҝҗиЎҢ canonical-align check
        run: node scripts/quality-gates/check-canonical-align.mjs

  decimal-panicking-ops:
    name: Decimal panicking-ops й—ЁзҰҒ
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: жү«жҸҸз”ҹдә§и·Ҝеҫ„ panicking Decimal з”Ёжі•
        run: node scripts/quality-gates/check-decimal-no-panicking-ops.mjs

  crate-versions:
    name: crates зӢ¬з«ӢзүҲжң¬й—ЁзҰҒ
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: е®үиЈ… Rust е·Ҙе…·й“?
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: ж ЎйӘҢ crates зӢ¬з«Ӣ version + path дҫқиө–еҜ№йҪҗ
        run: node scripts/quality-gates/check-crate-versions.mjs

  workspace-deps:
    name: дҫқиө–йӣҶдёӯз®ЎзҗҶй—ЁзҰҒ
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: е®үиЈ… Rust е·Ҙе…·й“?
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: ж ЎйӘҢдҫқиө–йӣҶдёӯз®ЎзҗҶпјҲзҰҒжӯўеҶ…иҒ”з¬¬дёүж–№зүҲжң¬пј?
        run: node scripts/quality-gates/check-workspace-deps.mjs
      - name: L1 еҚ•е…ғжөӢиҜ•
        run: node scripts/quality-gates/check-workspace-deps.test.mjs

  settings-hooks:
    name: settings hooks й—ЁзҰҒ
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: ж ЎйӘҢ settings.json hook е‘Ҫд»Өж јејҸ
        run: node scripts/quality-gates/check-settings-hooks.mjs
      - name: L1 еҚ•е…ғжөӢиҜ•
        run: node scripts/quality-gates/check-settings-hooks.test.mjs

  crate-status:
    name: crates иҝӣеәҰзңӢжқҝ
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: ж ЎйӘҢ STATUS.md ж–°йІңеә?
        run: node scripts/docs/gen-crate-status.mjs --check
      - name: еҶҷе…Ҙ Job Summary
        if: always()
        run: node scripts/docs/gen-crate-status.mjs --summary >> "$GITHUB_STEP_SUMMARY"
