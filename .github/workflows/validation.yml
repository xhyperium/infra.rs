name: 校验

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-lint:
    name: YAML 检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 运行 yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              new-line-at-end-of-file: disable

  toml-lint:
    name: TOML 检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 安装 taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - name: 运行 taplo
        run: taplo fmt --check

  markdown-lint:
    name: Markdown 检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 运行 markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            README.md
            AGENTS.md
            CLAUDE.md
            docs/**/*.md

  spellcheck:
    name: 拼写检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 运行 codespell
        uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_list: ser

  link-check:
    name: 链接检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 运行 lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress README.md AGENTS.md CLAUDE.md docs/
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  harness:
    name: Harness 健康检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 脱离 detached HEAD
        run: |
          if [ "$(git rev-parse --abbrev-ref HEAD)" = "HEAD" ]; then
            git checkout -b harness-ci
          fi
      - name: 安装 bd CLI
        run: curl -sSL https://raw.githubusercontent.com/gastownhall/beads/main/scripts/install.sh | bash
      - name: 初始化 beads
        run: bd init --quiet
      - name: 运行 harness check
        run: node scripts/quality-gates/check.mjs

  canonical-align:
    name: Canonical 对齐检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - name: 运行 canonical-align check
        run: node scripts/quality-gates/check-canonical-align.mjs

  decimal-panicking-ops:
    name: Decimal panicking-ops 门禁
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 扫描生产路径 panicking Decimal 用法
        run: node scripts/quality-gates/check-decimal-no-panicking-ops.mjs
