# clickhousex release workflow
# 触发: tag push clickhousex-*, workflow_dispatch (手动), schedule (nightly)
# 执行: quality gates → build → benchmark → smoke test

name: clickhousex release

on:
  push:
    tags:
      - 'clickhousex-*'
  pull_request:
    paths:
      - 'crates/adapters/storage/clickhouse/**'
      - '.github/workflows/clickhousex-release.yml'
  workflow_dispatch:
    inputs:
      run_live_tests:
        description: 'Run live ClickHouse tests (requires ClickHouse service)'
        type: boolean
        default: false
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC

concurrency:
  group: clickhousex-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gates:
    name: Quality Gates (fmt + clippy + test + docs)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature: ['', '--features scaffold']
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.85'
          components: rustfmt, clippy

      - name: cargo fmt
        run: cargo fmt -p clickhousex -- --check

      - name: cargo clippy
        run: cargo clippy -p clickhousex --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test -p clickhousex ${{ matrix.feature }} -- --test-threads=1

      - name: cargo doc test
        run: cargo test -p clickhousex --doc

      - name: workspace deps
        run: node scripts/quality-gates/check-workspace-deps.mjs

      - name: U+FFFD scan
        run: node scripts/fix-encoding.mjs --check crates/adapters/storage/clickhouse/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.6
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: clickhousex-test-pass
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        options: >-
          --health-cmd "clickhouse-client --password clickhousex-test-pass --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.85'

      - name: Run integration tests
        env:
          FOUNDATIONX_CLICKHOUSEX_HOST: localhost
          FOUNDATIONX_CLICKHOUSEX_HTTP_PORT: '8123'
          FOUNDATIONX_CLICKHOUSEX_USER: default
          FOUNDATIONX_CLICKHOUSEX_PASSWORD: clickhousex-test-pass
          FOUNDATIONX_CLICKHOUSEX_DATABASE: default
        run: |
          cargo test -p clickhousex --test functional_api_coverage -- --test-threads=1
          cargo test -p clickhousex --test integration_e2e -- --test-threads=1
          cargo test -p clickhousex --test concurrency_stability -- --test-threads=1
          cargo test -p clickhousex --test exception_recovery -- --test-threads=1
          cargo test -p clickhousex --test data_correctness -- --test-threads=1
          cargo test -p clickhousex --test security_observability -- --test-threads=1
          cargo test -p clickhousex --test version_compat -- --test-threads=1
          cargo test -p clickhousex --test schema_integrity -- --test-threads=1

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.6
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: clickhousex-test-pass
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.85'

      - name: Run benchmarks
        env:
          FOUNDATIONX_CLICKHOUSEX_HOST: localhost
          FOUNDATIONX_CLICKHOUSEX_HTTP_PORT: '8123'
          FOUNDATIONX_CLICKHOUSEX_USER: default
          FOUNDATIONX_CLICKHOUSEX_PASSWORD: clickhousex-test-pass
          FOUNDATIONX_CLICKHOUSEX_DATABASE: default
        run: cargo bench -p clickhousex --bench full_benchmark

  release:
    name: Release
    needs: [quality-gates, integration-tests]
    if: startsWith(github.ref, 'refs/tags/clickhousex-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches crate version
        run: |
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/clickhousex-//')
          CRATE_VERSION=$(grep '^version' crates/adapters/storage/clickhouse/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
            echo "ERROR: tag version $TAG_VERSION != crate version $CRATE_VERSION"
            exit 1
          fi
          echo "Release version: $TAG_VERSION"

      - name: Generate release notes
        run: |
          echo "# clickhousex ${{ github.ref_name }}" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "## Changelog" >> /tmp/release-notes.md
          sed -n '/^## \[\(0\.3\.[0-9]*\)\]/,/^## \[/p' crates/adapters/storage/clickhouse/CHANGELOG.md | head -n -1 >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "## Test Summary" >> /tmp/release-notes.md
          echo "- Quality gates: fmt + clippy + test ✅" >> /tmp/release-notes.md
          echo "- Integration tests: passed ✅" >> /tmp/release-notes.md
          echo "- Benchmark: completed ✅" >> /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
