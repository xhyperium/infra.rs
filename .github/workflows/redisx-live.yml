# Optional: redisx live 验证入口（生产 RedisPool/Client）
name: Redisx Live
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/adapters/storage/redis/**"
      - ".github/workflows/redisx-live.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live:
    # 默认不阻断主 CI；有 service 时手动/路径触发
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: live ignored tests
        env:
          # 无密码的 CI service；本地可改用 FOUNDATIONX_REDISX_*
          REDIS_URL: redis://127.0.0.1:6379
          FOUNDATIONX_REDISX_ADDR: 127.0.0.1:6379
          FOUNDATIONX_REDISX_DB: "0"
          FOUNDATIONX_REDISX_TLS: "false"
        run: |
          cargo test -p redisx --all-targets
          cargo test -p redisx -- --ignored --nocapture
          cargo test -p redisx --test live_kv_conformance -- --ignored --nocapture
